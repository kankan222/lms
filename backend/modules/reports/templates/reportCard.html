<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body {
  font-family: Arial;
  padding: 40px;
}

h1 {
  text-align:center;
}

table {
  width:100%;
  border-collapse:collapse;
  margin-top:20px;
}

th, td {
  border:1px solid #000;
  padding:8px;
  text-align:center;
}

.summary {
  margin-top:20px;
  font-size:18px;
}
</style>
</head>

<body>

<h1>Report Card</h1>

<p><strong>Student:</strong> {{studentName}}</p>
<p><strong>Exam:</strong> {{exam}}</p>

<table>
<tr>
<th>Subject</th>
<th>Marks</th>
</tr>

{{rows}}

</table>

<div class="summary">
<p>Total: {{total}}</p>
<p>Percentage: {{percentage}}%</p>
<p>Grade: {{grade}}</p>
</div>

</body>
</html>
